<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudeck Plugin Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Claudeck CSS variables (subset from variables.css) */
    :root {
      --bg:            #050508;
      --bg-secondary:  #0c0d10;
      --bg-tertiary:   #131419;
      --bg-deep:       #020203;
      --bg-elevated:   #181a22;
      --border:        #1e2028;
      --border-subtle: #161820;
      --border-accent: rgba(51,209,122,0.12);
      --text:          #c4cfd9;
      --text-secondary:#6b7a8d;
      --text-dim:      #3a4250;
      --accent:        #33d17a;
      --accent-dim:    rgba(51,209,122,0.08);
      --accent-mid:    rgba(51,209,122,0.18);
      --accent-solid:  #2ec27e;
      --accent-glow:   rgba(51,209,122,0.25);
      --purple:        #c69ff5;
      --purple-dim:    rgba(198,159,245,0.08);
      --user:          #7b9bf5;
      --user-dim:      rgba(123,155,245,0.08);
      --user-solid:    #6b8de5;
      --cyan:          #56d4dd;
      --amber:         #f0b429;
      --success:       #33d17a;
      --warning:       #e5a50a;
      --error:         #ed333b;
      --font-display:  "Chakra Petch", "Rajdhani", "Exo 2", sans-serif;
      --font-sans:     "Outfit", "DM Sans", "Segoe UI", sans-serif;
      --font-mono:     "JetBrains Mono", "SF Mono", "Fira Code", monospace;
      --radius:        4px;
      --radius-md:     8px;
      --radius-lg:     12px;
      --glow:          0 0 8px rgba(51,209,122,0.15);
      --glow-strong:   0 0 16px rgba(51,209,122,0.3);
      --shadow-sm:     0 2px 8px rgba(0,0,0,0.3);
      --shadow-md:     0 8px 24px rgba(0,0,0,0.4);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth:   cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      overflow: auto;
      min-height: 100vh;
    }

    /* Plugin container */
    #plugin-container {
      width: 100%;
      min-height: 100vh;
      position: relative;
    }

    /* Loading state */
    .preview-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      color: var(--text-dim);
      font-size: 13px;
    }
    .preview-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error state */
    .preview-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
      padding: 32px;
      text-align: center;
    }
    .preview-error-icon {
      font-size: 32px;
      opacity: 0.5;
    }
    .preview-error-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      color: var(--error);
    }
    .preview-error-msg {
      font-size: 12px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      max-width: 400px;
      word-break: break-word;
    }

    /* Watermark */
    .preview-watermark {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 10px;
      font-family: var(--font-display);
      color: var(--text-dim);
      opacity: 0.4;
      letter-spacing: 0.05em;
      pointer-events: none;
      z-index: 9999;
    }

    /* Badge (for plugins that use showBadge) */
    #showcase-badge {
      display: none;
      position: fixed;
      top: 8px;
      right: 12px;
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 8px;
      z-index: 9999;
    }

    /* Common plugin styles plugins expect */
    button {
      cursor: pointer;
      font-family: inherit;
    }
    input, textarea, select {
      font-family: inherit;
      color: var(--text);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 12px;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="plugin-container">
    <div class="preview-loading" id="loading">
      <div class="preview-spinner"></div>
      <span>Loading plugin...</span>
    </div>
  </div>

  <span id="showcase-badge"></span>
  <span id="showcase-title" style="display:none"></span>
  <div class="preview-watermark">Claudeck Showcase</div>

  <script type="module">
    const params = new URLSearchParams(window.location.search);
    const pluginName = params.get('plugin');
    const container = document.getElementById('plugin-container');
    const loading = document.getElementById('loading');

    if (!pluginName) {
      showError('No plugin specified', 'Add ?plugin=name to the URL');
    } else {
      loadPlugin(pluginName);
    }

    function showError(title, message) {
      container.innerHTML = `
        <div class="preview-error">
          <div class="preview-error-icon">&#x26A0;</div>
          <div class="preview-error-title">${title}</div>
          <div class="preview-error-msg">${message}</div>
        </div>
      `;
    }

    async function loadPlugin(name) {
      // Load plugin CSS if it exists
      const cssLink = document.createElement('link');
      cssLink.rel = 'stylesheet';
      cssLink.href = `/plugins/${name}/client.css`;
      cssLink.onerror = () => cssLink.remove(); // CSS is optional
      document.head.appendChild(cssLink);

      // Set up registration callback
      let registered = false;

      window.__showcaseOnRegister = (config, ctx) => {
        registered = true;
        loading.remove();

        try {
          const el = config.init(ctx);
          if (el instanceof HTMLElement) {
            container.appendChild(el);
            // Call onActivate if provided
            if (config.onActivate) config.onActivate();
          } else {
            showError('Plugin Error', 'init() did not return an HTMLElement');
          }
        } catch (err) {
          console.error('[showcase] Plugin init error:', err);
          showError('Plugin Error', err.message);
        }
      };

      // Load plugin JS
      try {
        await import(`/plugins/${name}/client.js`);
      } catch (err) {
        console.error('[showcase] Plugin import error:', err);
        showError('Failed to load plugin', err.message);
        return;
      }

      // Timeout if plugin never calls registerTab
      setTimeout(() => {
        if (!registered) {
          showError('Plugin Timeout', 'Plugin did not call registerTab() within 10 seconds.');
        }
      }, 10000);
    }
  </script>
</body>
</html>
